<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>LF Recibos</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f3f3f3;
      padding:20px;
      color:#222;
    }

    .container{
      max-width:700px;
      margin:auto;
    }

    .card{
      background:white;
      padding:24px;
      border-radius:16px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    .topo{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:30px;
    }

    .logo{
      width:60px;
    }

    h1{
      font-size:22px;
    }

    .sub{
      color:#666;
      font-size:14px;
      margin-top:4px;
    }

    .section-title{
      margin-top:28px;
      margin-bottom:16px;
      font-size:18px;
      font-weight:bold;
    }

    .field{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:bold;
    }

    input,
    textarea{
      width:100%;
      padding:14px;
      border:1px solid #dcdcdc;
      border-radius:12px;
      font-size:16px;
      background:#fafafa;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .btn{
      width:100%;
      border:none;
      padding:18px;
      border-radius:14px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-pdf{
      background:#111;
      color:white;
      margin-top:20px;
    }

    .status-message{
      display:none;
      margin-top:14px;
      padding:12px;
      border-radius:10px;
      background:#fff3cd;
      color:#664d03;
      font-size:14px;
    }

    .btn-reset{
      background:#dcdcdc;
      color:#222;
      margin-top:12px;
    }

    .print-sheet{
      display:none;
    }

    @media print{

      body{
        background:white;
        padding:0;
      }

      .container{
        max-width:none;
        margin:0;
      }

      .card{
        display:none;
      }

      .print-sheet{
        display:block;
        width:100%;
        min-height:100vh;
        padding:42px 44px;
        color:#000;
        font-size:12px;
      }

      .print-header{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        margin-bottom:42px;
      }

      .print-logo{
        width:76px;
        height:auto;
        display:block;
      }

      .print-company{
        line-height:1.55;
        text-align:right;
        font-style:italic;
        font-weight:bold;
        font-size:10px;
      }

      .print-title-row{
        display:flex;
        justify-content:space-between;
        align-items:center;
        border-bottom:1px solid #999;
        padding-bottom:8px;
        font-size:14px;
        font-weight:bold;
      }

      .print-client{
        margin-top:8px;
        font-size:13px;
        font-weight:bold;
      }

      .print-address{
        margin-top:6px;
      }

      .print-receipt-text{
        margin-top:62px;
        max-width:610px;
        font-size:15px;
        line-height:1.35;
      }

      .print-signature{
        margin-top:72px;
      }

      .print-signature-mark{
        margin:14px 0 8px;
        width:150px;
        height:auto;
        display:block;
      }

      .print-footer{
        line-height:1.5;
      }

    }

    @media(max-width:600px){

      body{
        padding:12px;
      }

      .card{
        padding:18px;
      }

      .grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <div class="topo">

        <img class="logo" src="img/logo-lf.png" alt="LF Serviços" />

        <div>
          <h1>LF Serviços s</h1>
          <div class="sub">
            Gerador de Recibos
          </div>
        </div>

      </div>

      <div class="section-title">
        Dados do Recibo
      </div>

      <div class="grid">

        <div class="field">
          <label>Data</label>
          <input type="date" id="data" required>
        </div>

        <div class="field">
          <label>Valor</label>
          <input type="number" id="valor" min="0.01" step="0.01" required>
        </div>

      </div>

      <div class="field">
        <label>Cliente</label>
        <input type="text" id="cliente" required>
      </div>

      <div class="field">
        <label>Endereco</label>
        <textarea id="endereco" required></textarea>
      </div>

      <div class="field">
        <label>Descricao do servico</label>
        <textarea id="descricao" required></textarea>
      </div>

      <button type="button" class="btn btn-pdf" id="generate-pdf-btn">
        GERAR PDF
      </button>

      <button type="button" class="btn btn-reset" onclick="resetForm()">
        LIMPAR FORMULARIO
      </button>

      <div class="status-message" id="status-message"></div>

    </div>

  </div>

  <section class="print-sheet">

    <div class="print-header">

      <img class="print-logo" src="img/logo-lf.png" alt="LF Serviços">

      <div class="print-company">
        <div>LF Serviços em Elevadores LTDA</div>
        <div>CNPJ: 14.445.230/0001-79</div>
        <div>Rua da Mangueira, 320 - 6286000</div>
        <div>Pindoretama - Centro</div>
        <div>85 99849 2021</div>
      </div>

    </div>

    <div class="print-title-row">
      <div>RECIBO</div>
      <div id="print-date"></div>
    </div>

    <div class="print-client" id="print-client"></div>
    <div class="print-address" id="print-address"></div>

    <div class="print-receipt-text" id="print-receipt-text"></div>

    <div class="print-signature">
      <div><em>Atenciosamente</em></div>
      <img class="print-signature-mark" src="img/assinatura.png" alt="Assinatura">
      <div class="print-footer">
        <div>L. F. Serviços em Elevadores LTDA - ME</div>
        <div>José de Arimatéia Falcão</div>
        <div>85 99849-2021</div>
      </div>
    </div>

  </section>

    function formatCurrency(value){

      return value.toLocaleString('pt-BR', {
        style:'currency',
        currency:'BRL'
      });

    }

    function formatDate(value){

      const [year, month, day] = value.split('-');
      return `${day}/${month}/${year}`;

    }

    function buildFileName(){

      const meses = [
        'janeiro','fevereiro','marco','abril','maio','junho',
        'julho','agosto','setembro','outubro','novembro','dezembro'
      ];

      const clienteRaw = document.getElementById('cliente').value;
      const dataRaw    = document.getElementById('data').value;

      const clienteFormatado = clienteRaw
        .trim()
        .replace(/\s+/g, '_')
        .replace(/[\/\\:*?"<>|]/g, '');

      const [ano, mes] = dataRaw.split('-');
      const nomeMes    = meses[parseInt(mes, 10) - 1] || '';

      const agora    = new Date();
      const minutos  = String(agora.getMinutes()).padStart(2, '0');
      const segundos = String(agora.getSeconds()).padStart(2, '0');
      const sufixo   = `${minutos}${segundos}`;

      return `${clienteFormatado}_${nomeMes}_${ano}-${sufixo}.pdf`;

    }

    async function generatePdf(){

      showStatus('Validando dados...');

      const requiredFields = document.querySelectorAll(
        '#data, #valor, #cliente, #endereco, #descricao'
      );

      for(const field of requiredFields){

        if(!field.checkValidity()){
          showStatus('Preencha todos os campos obrigatorios.');
          field.reportValidity();
          field.focus();
          return;
        }

      }

      populatePrintSheet();
      showStatus('Gerando PDF...');

      try{
        await downloadPdf();
        showStatus('PDF gerado com sucesso.');
      }catch(error){
        console.error(error);
        const message = error && error.message
          ? error.message
          : 'Erro desconhecido ao gerar o PDF.';

        showStatus(`Nao foi possivel gerar o PDF: ${message}`);
        alert(`Nao foi possivel gerar o PDF automaticamente: ${message}`);
      }

    }

    function populatePrintSheet(){

      const cliente = document.getElementById('cliente').value;
      const endereco = document.getElementById('endereco').value;
      const valor = parseFloat(document.getElementById('valor').value);
      const descricao = document.getElementById('descricao').value;

      document.getElementById('print-date').innerText =
        formatDate(document.getElementById('data').value);

      document.getElementById('print-client').innerText = cliente;
      document.getElementById('print-address').innerText = endereco;
      document.getElementById('print-receipt-text').innerText =
        `Recebemos de ${cliente} a importância de ${formatCurrency(valor)}, referente ao serviço de ${descricao}.`;

    }

    async function downloadPdf(){

      if(!window.jspdf){
        throw new Error('jsPDF nao foi carregado.');
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation:'portrait',
        unit:'mm',
        format:'a4'
      });

      const pageWidth = doc.internal.pageSize.getWidth();
      const left = 22;
      const right = pageWidth - 22;
      let currentY = 24;

      const logo = PDF_LOGO;
      const signature = PDF_SIGNATURE;
      const cliente = document.getElementById('cliente').value;
      const endereco = document.getElementById('endereco').value;
      const valor = parseFloat(document.getElementById('valor').value);
      const descricao = document.getElementById('descricao').value;
      const receiptText =
        `Recebemos de ${cliente} a importancia de ${formatCurrency(valor)}, referente ao servico de ${descricao}.`;

      if(logo){
        doc.addImage(logo, 'PNG', left, 12, 24, 28);
      }

      doc.setFont('helvetica', 'bolditalic');
      doc.setFontSize(8);
      doc.text('LF Serviços em Elevadores LTDA', right, currentY, { align:'right' });
      doc.text('CNPJ: 14.445.230/0001-79', right, currentY + 5, { align:'right' });
      doc.text('Rua da Mangueira, 320 - 6286000', right, currentY + 10, { align:'right' });
      doc.text('Pindoretama - Centro', right, currentY + 15, { align:'right' });
      doc.text('85 99849 2021', right, currentY + 20, { align:'right' });

      currentY = 54;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.text('RECIBO', left, currentY);
      doc.text(
        formatDate(document.getElementById('data').value),
        right,
        currentY,
        { align:'right' }
      );
      doc.setDrawColor(140, 140, 140);
      doc.line(left, currentY + 3, right, currentY + 3);

      doc.setFontSize(10);
      doc.text(cliente, left, currentY + 9);
      doc.setFont('helvetica', 'normal');
      doc.text(doc.splitTextToSize(endereco, 166), left, currentY + 15);

      currentY = 92;
      doc.setFontSize(12);
      doc.text(doc.splitTextToSize(receiptText, 166), left, currentY);

      currentY = 130;
      doc.setFontSize(10);
      doc.setFont('helvetica', 'italic');
      doc.text('Atenciosamente', left, currentY);
      if(signature){
        doc.addImage(signature, 'PNG', left, currentY + 5, 42, 12);
      }
      doc.setFont('helvetica', 'normal');
      doc.text('L. F. Serviços em Elevadores LTDA - ME', left, currentY + 24);
      doc.text('José de Arimatéia Falcão', left, currentY + 29);
      doc.text('85 99849-2021', left, currentY + 34);

      doc.save(buildFileName());

    }

    function resetForm(){

      document.getElementById('data').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('cliente').value = '';
      document.getElementById('endereco').value = '';
      document.getElementById('descricao').value = '';
      hideStatus();

    }

    function showStatus(message){

      const status = document.getElementById('status-message');
      status.innerText = message;
      status.style.display = 'block';

    }

    function hideStatus(){

      const status = document.getElementById('status-message');
      status.innerText = '';
      status.style.display = 'none';

    }

    document.getElementById('generate-pdf-btn').addEventListener('click', generatePdf);

  </script>

</body>
</html>
