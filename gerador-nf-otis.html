<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gerador de Texto NF - OTIS</title>
  <!-- HTML -->
  <style>
    /* CSS - Mobile first, clean and modern */
    :root{
      --bg:#f7f7f8;
      --card:#ffffff;
      --muted:#6b6b6b;
      --accent:#f7dd6b;
      --accent-strong:#f4d24b;
      --radius:12px;
      --shadow: 0 6px 18px rgba(21,21,21,0.06);
      --glass: rgba(255,255,255,0.6);
      --mono: 'Courier New', ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    }
    html,body{height:100%;}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:var(--bg);
      color:#111;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:20px;
      box-sizing:border-box;
    }

    .container{
      max-width:820px;
      margin:0 auto;
    }

    header{
      margin-bottom:18px;
    }
    h1{
      font-size:20px;
      margin:0 0 6px 0;
      font-weight:600;
    }
    p.lead{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }

    form.card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      display:grid;
      gap:12px;
    }

    .row{
      display:flex;
      gap:10px;
    }
    .col{flex:1;}

    label{
      display:block;
      font-size:12px;
      margin-bottom:6px;
      font-weight:600;
    }
    .label-accent{
      display:inline-block;
      background:linear-gradient(90deg, rgba(247,221,107,0.25), rgba(244,210,75,0.12));
      padding:4px 8px;
      border-radius:999px;
      color:#8a6b00;
      font-weight:700;
      font-size:11px;
    }

    input[type="text"], input[type="date"], textarea{
      width:100%;
      padding:12px 12px;
      border-radius:10px;
      border:1px solid #e6e6e9;
      font-size:15px;
      box-sizing:border-box;
      background:transparent;
    }

    input[type="date"]{padding-top:10px;padding-bottom:10px}

    .large-btn{
      display:inline-block;
      width:100%;
      padding:14px 16px;
      border-radius:12px;
      border:0;
      background:linear-gradient(180deg,var(--accent-strong),var(--accent));
      color:#111;
      font-weight:700;
      font-size:16px;
      box-shadow:0 6px 14px rgba(244,210,75,0.18);
      cursor:pointer;
    }

    .resultado-container{
      margin-top:16px;
      display:grid;
      gap:12px;
    }

    .card-result{
      background:var(--card);
      border-radius:12px;
      box-shadow:var(--shadow);
      overflow:hidden;
      opacity:0;
      transform:translateY(8px);
      transition:all 320ms cubic-bezier(.18,.9,.32,1);
    }
    .card-result.show{
      opacity:1;
      transform:none;
    }

    .card-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      border-bottom:1px solid #f1f1f2;
      background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.4));
    }
    .card-title{font-weight:700;font-size:13px;color:#222}
    .copy-group{display:flex;align-items:center;gap:10px}

    .copy-btn{
      background:transparent;
      border:0;
      padding:8px 10px;
      border-radius:8px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      color:#444;
    }
    .copy-btn .feedback{
      font-size:12px;
      color:green;
      font-weight:700;
      display:none;
    }
    .copy-btn.copied{color:green}
    .copy-btn.copied .feedback{display:inline-block}

    .code-area{
      padding:12px;
    }
    textarea.snippet{
      width:100%;
      min-height:80px;
      resize:vertical;
      font-family:var(--mono);
      font-size:14px;
      line-height:1.45;
      background:#fbfbfc;
      border-radius:8px;
      border:1px solid #eee;
      padding:12px;
      color:#111;
    }
    textarea.snippet[readonly]{
      background:linear-gradient(180deg,#fbfbfc,#ffffff);
    }

    .hint{font-size:13px;color:var(--muted)}

    @media(min-width:720px){
      .row.two{display:flex}
      .row.two > *{flex:1}
    }

    .invalid{outline:2px solid rgba(255,80,80,0.12);box-shadow:0 6px 18px rgba(255,80,80,0.05)}

    .copied-flash{
      position:fixed;right:18px;bottom:18px;background:linear-gradient(180deg,#dff8e0,#bff0c8);padding:10px 14px;border-radius:10px;box-shadow:0 6px 24px rgba(12,56,24,0.08);font-weight:700;color:#0a5a1a;font-size:13px;display:none}
    .copied-flash.show{display:block}

  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Gerador de Texto NF - OTIS</h1>
      <p class="lead">Preencha os dados e gere rapidamente os textos para a nota fiscal / contrato.</p>
    </header>

    <form id="nf-form" class="card" onsubmit="return false;">
      <div>
        <label class="label-accent">Pedido</label>
        <input id="pedido" type="text" placeholder="Número do pedido" autocomplete="off" />
      </div>

      <div>
        <label class="label-accent">Num. NF</label>
        <input id="num_nf" type="text" inputmode="numeric" placeholder="1323" autocomplete="off" />
      </div>

      <div>
        <label class="label-accent">Contrato</label>
        <input id="contrato" type="text" placeholder="Ex: 37SU8881A" autocomplete="off" />
      </div>

      <div>
        <label class="label-accent">Valor</label>
        <input id="valor" type="text" inputmode="numeric" placeholder="R$ 0,00" />
      </div>

      <div>
        <label class="label-accent">Cliente</label>
        <input id="cliente" type="text" placeholder="Nome do cliente" autocomplete="off" />
      </div>

      <div>
        <label class="label-accent">Cidade e UF</label>
        <input id="cidadeuf" list="cidades" type="text" placeholder="Fortaleza CE" autocomplete="off" />
        <datalist id="cidades">
          <!-- Prioritizadas -->
          <option value="Fortaleza CE">
          <option value="Teresina PI">
          <option value="São Luís MA">
          <!-- Capitais e cidades principais do Brasil -->
          <option value="Rio Branco AC">
          <option value="Maceió AL">
          <option value="Macapá AP">
          <option value="Manaus AM">
          <option value="Salvador BA">
          <option value="Vitória ES">
          <option value="Goiânia GO">
          <option value="Cuiabá MT">
          <option value="Campo Grande MS">
          <option value="Belo Horizonte MG">
          <option value="Belém PA">
          <option value="João Pessoa PB">
          <option value="Curitiba PR">
          <option value="Recife PE">
          <option value="Rio de Janeiro RJ">
          <option value="Natal RN">
          <option value="Porto Alegre RS">
          <option value="Boa Vista RR">
          <option value="Florianópolis SC">
          <option value="São Paulo SP">
          <option value="Aracaju SE">
          <option value="Palmas TO">
          <option value="Brasília DF">
          <option value="Porto Velho RO">
        </datalist>
      </div>

      <div>
        <label class="label-accent">Serviço</label>
        <input id="servico" type="text" placeholder="Ex: Instalação" autocomplete="off" />
      </div>

      <div>
        <label class="label-accent">Vencimento da NF</label>
        <input id="vencimento" type="date" />
      </div>

      <div>
        <button id="gerar" class="large-btn" type="button">Gerar Textos</button>
      </div>

      <div id="msg" class="hint" aria-live="polite" style="display:none;margin-top:6px;color:#b00020"></div>
    </form>

    <div class="resultado-container" id="resultados" aria-live="polite"></div>

    <div id="copiedFlash" class="copied-flash">Copiado!</div>
  </div>

  <script>
    // JS - helper functions and behavior

    // Format input as BRL while typing (shows R$ 0.000,00)
    const valorEl = document.getElementById('valor');
    function formatCurrencyBRL(value){
      if (value === '' || value == null) return '';
      const onlyNums = value.toString().replace(/[^0-9]/g,'');
      const intVal = parseInt(onlyNums || '0',10);
      const cents = intVal / 100;
      return cents.toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
    }

    function displayBRLWithSymbol(value){
      if(value===''||value==null) return '';
      return 'R$ ' + formatCurrencyBRL(value);
    }

    function setCaretEnd(el){
      try{ el.selectionStart = el.selectionEnd = el.value.length; }catch(e){}
    }

    valorEl.addEventListener('input', e=>{
      const cleaned = e.target.value.replace(/[^0-9]/g,'');
      // keep up to large numbers
      const number = cleaned.replace(/^0+/, '');
      const formatted = displayBRLWithSymbol(number);
      e.target.value = formatted;
      setCaretEnd(e.target);
    });

    // on blur ensure at least R$ 0,00
    valorEl.addEventListener('blur', e=>{
      const cleaned = e.target.value.replace(/[^0-9]/g,'');
      if(!cleaned) e.target.value = '';
      else e.target.value = displayBRLWithSymbol(cleaned);
    });

    // Utility to get numeric value without R$
    function getNumericValor(){
      const v = valorEl.value.replace(/[^0-9]/g,'');
      if(!v) return null;
      const n = parseInt(v,10)/100;
      // format without currency symbol but with pt-BR formatting
      return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    // Date format YYYY-MM-DD -> DD/MM/AAAA
    function formatDateBR(dateStr){
      if(!dateStr) return '';
      const parts = dateStr.split('-');
      if(parts.length!==3) return dateStr;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    const form = document.getElementById('nf-form');
    const btnGerar = document.getElementById('gerar');
    const resultados = document.getElementById('resultados');
    const msg = document.getElementById('msg');
    const copiedFlash = document.getElementById('copiedFlash');

    function validateFields(data){
      const fields = ['pedido','num_nf','contrato','valor','cliente','cidadeuf','servico','vencimento'];
      let ok = true;
      fields.forEach(id=>{
        const el = document.getElementById(id);
        el.classList.remove('invalid');
        if(!data[id]){
          ok = false;
          el.classList.add('invalid');
        }
      });
      return ok;
    }

    function makeCard(title, text, index){
      const card = document.createElement('div');
      card.className = 'card-result';

      const header = document.createElement('div');
      header.className = 'card-header';
      const t = document.createElement('div'); t.className='card-title'; t.textContent = title;

      const copyGroup = document.createElement('div'); copyGroup.className='copy-group';
      const btn = document.createElement('button'); btn.className='copy-btn'; btn.type='button';
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 9H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path><rect x="9" y="3" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></rect></svg><span class="feedback">Copiado!</span>`;

      copyGroup.appendChild(btn);
      header.appendChild(t);
      header.appendChild(copyGroup);

      const codeArea = document.createElement('div'); codeArea.className='code-area';
      const ta = document.createElement('textarea');
      ta.className='snippet';
      ta.readOnly = true;
      ta.value = text;

      // allow editing when user clicks/focuses the textarea
      ta.addEventListener('focus', ()=>{ ta.readOnly = false; ta.classList.add('editing'); });
      ta.addEventListener('blur', ()=>{ /* keep edited content */ });

      // copy behavior
      btn.addEventListener('click', async ()=>{
        try{
          await navigator.clipboard.writeText(ta.value);
          // feedback
          btn.classList.add('copied');
          const fb = btn.querySelector('.feedback'); if(fb) fb.style.display='inline-block';
          copiedFlash.classList.add('show');
          setTimeout(()=>{ btn.classList.remove('copied'); if(fb) fb.style.display='none'; copiedFlash.classList.remove('show'); }, 1800);
        }catch(err){
          alert('Não foi possível copiar automaticamente. Selecione e copie manualmente.');
        }
      });

      codeArea.appendChild(ta);
      card.appendChild(header);
      card.appendChild(codeArea);

      return card;
    }

    function generateTexts(data){
      // TEXT 1 - Contrato summary
      const t1 = `CONTRATO: ${data.contrato} - ${data.cliente} - PEDIDO: ${data.pedido}`;
      // TEXT 2 - NF line
      const clienteUp = data.cliente.toUpperCase();
      const servicoUp = data.servico.toUpperCase();
      const t2 = `NF ${data.num_nf} ${clienteUp} ${servicoUp} CONTRATO ${data.contrato} - ${data.cliente} - PEDIDO ${data.pedido}`;
      return [t1,t2];
    }

    btnGerar.addEventListener('click', ()=>{
      msg.style.display='none';
      const pedido = document.getElementById('pedido').value.trim();
      const num_nf = document.getElementById('num_nf').value.trim();
      const contrato = document.getElementById('contrato').value.trim();
      const valorFmt = getNumericValor();
      const cliente = document.getElementById('cliente').value.trim();
      const cidadeuf = document.getElementById('cidadeuf').value.trim();
      const servico = document.getElementById('servico').value.trim();
      const venc = document.getElementById('vencimento').value;
      const vencFmt = formatDateBR(venc);

      const data = {pedido, num_nf, contrato, valor: valorFmt, cliente, cidadeuf, servico, vencimento: vencFmt};

      if(!validateFields({pedido, num_nf, contrato, valor:valorFmt, cliente, cidadeuf, servico, vencimento:venc})){
        msg.style.display='block';
        msg.textContent = 'Por favor, preencha todos os campos.';
        return;
      }

      // clear previous results
      resultados.innerHTML='';

      const textos = generateTexts(data);
      const titles = ['Para colar na NF','Para colar no nome do arquivo da NF'];

      textos.forEach((txt,i)=>{
        const card = makeCard(titles[i], txt, i+1);
        resultados.appendChild(card);
        // small delay to trigger animation
        setTimeout(()=> card.classList.add('show'), 20 + i*80);
      });

      // focus first textarea for quick copy/edit
      setTimeout(()=>{
        const firstTa = resultados.querySelector('textarea');
        if(firstTa) firstTa.focus();
      }, 380);

    });

    // small accessibility: pressing Enter on any field triggers generate
    ['pedido','num_nf','contrato','valor','cliente','cidadeuf','servico','vencimento'].forEach(id=>{
      const el = document.getElementById(id);
      el.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){
          e.preventDefault(); btnGerar.click();
        }
      });
    });

  </script>
</body>
</html>
